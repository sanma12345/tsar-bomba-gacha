<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>サんマのツァーリ・ボンバガチャ DELUXE</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="flash"></div>
  <div id="shockwave"></div>
  <div id="fire"></div>
  <div id="mushroom">☁️</div>
  <div id="lightning">⚡</div>

  <main class="game">
    <h1>☢️ サんマのツァーリ・ボンバガチャ ☢️</h1>
    <div class="leader">🧑‍💼</div>
    <p id="todayRate">曜日確率を読み込み中...</p>

    <button id="btn">核実験開始</button>

    <div class="stats">
      <div>試行回数：<span id="count">0</span></div>
      <div>大爆発：<span id="hit">0</span></div>
    </div>

    <div id="result">ボタンを押せ。</div>
    <img id="photo" alt="爆発写真">
  </main>

  <script src="script.js"></script>
</body>
</html>
